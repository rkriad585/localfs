{% extends "base.html" %}
{% block title %}Playing: {{ filename }}{% endblock %}
{% block content %}
<header class="w-full max-w-6xl mx-auto px-4 py-4">
    <a href="{{ url_for('index', key=request.args.get('key')) }}" class="text-accent hover:text-accent-hover transition-colors">
        &larr; Back to Library
    </a>
    <h1 class="text-2xl font-bold text-primary truncate mt-2" title="{{ filename }}">{{ filename }}</h1>
</header>

<div class="w-full max-w-6xl mx-auto p-4 flex-grow flex items-center justify-center min-h-[70vh]">
    {% if file_type == 'video' %}
    <video
        controls
        autoplay
        preload="auto"
        class="w-full h-full max-h-[80vh] rounded-lg shadow-card bg-black">
        <source src="{{ url_for('serve_media', filename=filename) }}" type="{{ mime_type }}">
        Your browser does not support the video tag.
    </video>
    {% elif file_type == 'audio' %}
    <div class="w-full max-w-md bg-card rounded-lg p-8 shadow-card text-center">
        <i class="fas fa-music text-6xl text-accent mb-6"></i>
        <h2 class="text-xl font-semibold text-primary truncate mb-6">{{ filename }}</h2>
        <audio
            controls
            autoplay
            preload="auto"
            class="w-full">
            <source src="{{ url_for('serve_media', filename=filename) }}" type="{{ mime_type }}">
            Your browser does not support the audio tag.
        </audio>
    </div>
    {% endif %}
</div>
{% endblock %}
